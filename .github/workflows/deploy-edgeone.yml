name: Deploy to EdgeOne (Tencent Cloud)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build:css

      - name: Deploy to Tencent COS
        run: |
          # Extract bucket name from EDGEONE_BUCKET secret
          # Secret may be: "mcreator-1251234567" OR "https://mcreator-1251234567.cos.ap-shanghai.myqcloud.com"
          RAW="${{ secrets.EDGEONE_BUCKET }}"
          
          # Remove protocol prefix if present
          BUCKET_NO_PROTO="${RAW#https://}"
          BUCKET_NO_PROTO="${BUCKET_NO_PROTO#http://}"
          
          # Extract just the bucket name part (before .cos.)
          BUCKET_NAME="${BUCKET_NO_PROTO%%.cos.*}"
          
          echo "Raw: $RAW"
          echo "Bucket name: $BUCKET_NAME"
          
          # Sync static assets (long cache)
          aws s3 sync . "s3://${BUCKET_NAME}/" \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "node_modules/*" \
            --exclude "cli/*" \
            --exclude "scripts/*" \
            --exclude "tests/*" \
            --exclude "utils/*" \
            --exclude "docs/*" \
            --exclude ".vscode/*" \
            --exclude ".idea/*" \
            --exclude ".env*" \
            --exclude "*.md" \
            --exclude "*.sh" \
            --exclude "*.log" \
            --exclude "*.swp" \
            --exclude "package*.json" \
            --exclude "tailwind.config.js" \
            --exclude "lighthouserc.json" \
            --exclude "vercel.json" \
            --exclude ".cosignore" \
            --exclude "site.config.schema.json" \
            --exclude ".DS_Store" \
            --exclude "Thumbs.db" \
            --cache-control "public, max-age=31536000, immutable" \
            --endpoint-url "https://cos.ap-shanghai.myqcloud.com"
          
          # Sync HTML files (short cache)
          aws s3 sync . "s3://${BUCKET_NAME}/" \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=3600" \
            --endpoint-url "https://cos.ap-shanghai.myqcloud.com"

      - name: Purge EdgeOne Cache
        run: |
          curl -X POST "https://api.edgeone.ai/v1/zones/${{ secrets.EDGEONE_ZONE_ID }}/cache/purge" \
            -H "Authorization: Bearer ${{ secrets.EDGEONE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"files": ["https://${{ secrets.SITE_DOMAIN }}/*"]}'

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deployment successful"
          echo "🌐 Site: https://${{ secrets.SITE_DOMAIN }}"
