name: Deploy to EdgeOne (Tencent Cloud)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build:css

      - name: Configure AWS CLI for COS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.COS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.COS_SECRET_ACCESS_KEY }}
          aws-region: ap-shanghai

      - name: Sync static assets to COS
        run: |
          aws s3 sync . s3://${{ secrets.EDGEONE_BUCKET }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "node_modules/*" \
            --exclude ".env*" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync HTML files with short cache
        run: |
          aws s3 sync . s3://${{ secrets.EDGEONE_BUCKET }} \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=3600"

      - name: Purge EdgeOne Cache
        run: |
          curl -X POST "https://api.edgeone.ai/v1/zones/${{ secrets.EDGEONE_ZONE_ID }}/cache/purge" \
            -H "Authorization: Bearer ${{ secrets.EDGEONE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"files": ["https://${{ secrets.SITE_DOMAIN }}/*"]}'

      - name: Notify on success
        if: success()
        run: |
          echo "Deployment successful"
          echo "Site: https://${{ secrets.SITE_DOMAIN }}"