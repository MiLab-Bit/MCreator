name: Deploy to EdgeOne (Tencent Cloud)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build:css

      - name: Install coscmd
        run: pip install coscmd

      - name: Configure coscmd
        run: |
          coscmd config -a ${{ secrets.COS_ACCESS_KEY_ID }} \
                        -s ${{ secrets.COS_SECRET_ACCESS_KEY }} \
                        -b ${{ secrets.EDGEONE_BUCKET }} \
                        -r ${{ secrets.COS_REGION }}

      - name: Upload to COS
        run: coscmd upload -r ./ /

      - name: Purge EdgeOne Cache
        run: |
          curl -X POST "https://api.edgeone.ai/v1/zones/${{ secrets.EDGEONE_ZONE_ID }}/cache/purge" \
            -H "Authorization: Bearer ${{ secrets.EDGEONE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"files": ["https://${{ secrets.SITE_DOMAIN }}/*"]}'

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deployment successful"
          echo "🌐 Site: https://${{ secrets.SITE_DOMAIN }}"
