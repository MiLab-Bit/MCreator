name: Deploy to EdgeOne (Tencent Cloud)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build:css

      - name: Install coscmd
        run: pip install coscmd

      - name: Configure coscmd
        run: |
          coscmd config -a ${{ secrets.COS_ACCESS_KEY_ID }} \
                        -s ${{ secrets.COS_SECRET_ACCESS_KEY }} \
                        -b ${{ secrets.EDGEONE_BUCKET }} \
                        -r ${{ secrets.COS_REGION }}

      # 构建 Tailwind CSS（零构建模式只需要 CSS）
      - name: Build Tailwind CSS
        run: |
          npm ci
          npm run build:css

      # 只上传必要的网站文件，排除 node_modules 和其他开发文件
      - name: Upload to COS (site files only)
        run: |
          # 上传根目录 HTML 文件
          coscmd upload -r ./index.html /index.html
          # 上传 templates/ 目录
          coscmd upload -r ./templates/ /templates/
          # 上传 styles/ 目录
          coscmd upload -r ./styles/ /styles/
          # 上传 components/ 目录
          coscmd upload -r ./components/ /components/
          # 上传 features/ 目录
          coscmd upload -r ./features/ /features/
          # 上传 content/ 目录
          coscmd upload -r ./content/ /content/
          # 上传 vendor/ 目录
          coscmd upload -r ./vendor/ /vendor/
          # 上传配置文件
          coscmd upload -r ./site.config.json /site.config.json

      - name: Purge EdgeOne Cache
        run: |
          curl -X POST "https://api.edgeone.ai/v1/zones/${{ secrets.EDGEONE_ZONE_ID }}/cache/purge" \
            -H "Authorization: Bearer ${{ secrets.EDGEONE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"files": ["https://${{ secrets.SITE_DOMAIN }}/*"]}'

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deployment successful"
          echo "🌐 Site: https://${{ secrets.SITE_DOMAIN }}"
