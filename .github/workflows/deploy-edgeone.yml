name: Deploy to EdgeOne (Tencent Cloud)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build:css

      - name: Configure AWS CLI credentials directly
        run: |
          export AWS_ACCESS_KEY_ID="${{ secrets.COS_ACCESS_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.COS_SECRET_ACCESS_KEY }}"
          export AWS_REGION="ap-shanghai"
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set region "$AWS_REGION"

      - name: Sync static assets to COS
        run: |
          aws s3 sync . s3://${{ secrets.EDGEONE_BUCKET }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "node_modules/*" \
            --exclude "cli/*" \
            --exclude "scripts/*" \
            --exclude "tests/*" \
            --exclude "utils/*" \
            --exclude "docs/*" \
            --exclude ".vscode/*" \
            --exclude ".idea/*" \
            --exclude ".env*" \
            --exclude "*.md" \
            --exclude "*.sh" \
            --exclude "*.log" \
            --exclude "*.swp" \
            --exclude "package*.json" \
            --exclude "tailwind.config.js" \
            --exclude "lighthouserc.json" \
            --exclude "vercel.json" \
            --exclude ".cosignore" \
            --exclude "site.config.schema.json" \
            --exclude ".DS_Store" \
            --exclude "Thumbs.db" \
            --cache-control "public, max-age=31536000, immutable" \
            --endpoint-url "https://cos.ap-shanghai.myqcloud.com"

      - name: Sync HTML files with short cache
        run: |
          aws s3 sync . s3://${{ secrets.EDGEONE_BUCKET }} \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=3600" \
            --endpoint-url "https://cos.ap-shanghai.myqcloud.com"

      - name: Purge EdgeOne Cache
        run: |
          curl -X POST "https://api.edgeone.ai/v1/zones/${{ secrets.EDGEONE_ZONE_ID }}/cache/purge" \
            -H "Authorization: Bearer ${{ secrets.EDGEONE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"files": ["https://${{ secrets.SITE_DOMAIN }}/*"]}'

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deployment successful"
          echo "🌐 Site: https://${{ secrets.SITE_DOMAIN }}"
