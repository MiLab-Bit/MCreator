name: Lighthouse CI

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build:css

      - name: Start local server
        run: |
          npx serve . -p 3000 &
          sleep 5

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:3000
            http://localhost:3000/examples/portfolio-example.html
          uploadArtifacts: true
          temporaryPublicStorage: true
          budgetPath: ./lighthouserc.json
          configPath: ./lighthouserc.json

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('./lhci_reports/manifest.json', 'utf8'));
            
            const summary = results.map(r => {
              const url = r.url.replace('http://localhost:3000', '');
              const scores = r.summary;
              return `### ${url || 'Home'}
            - Performance: ${Math.round(scores.performance * 100)}%
            - Accessibility: ${Math.round(scores.accessibility * 100)}%
            - Best Practices: ${Math.round(scores['best-practices'] * 100)}%
            - SEO: ${Math.round(scores.seo * 100)}%`;
            }).join('\n\n');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Lighthouse Results\n\n${summary}`
            });