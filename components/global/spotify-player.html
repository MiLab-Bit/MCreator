<!-- ============================================
     参数说明
     ============================================
     URL 格式：
       单曲：   embed/track/{TRACK_ID}
       专辑：   embed/album/{ALBUM_ID}
       播放列表：embed/playlist/{PLAYLIST_ID}
       艺术家： embed/artist/{ARTIST_ID}
     
     可选参数（URL 后加 ? 或 &）：
       theme=0  深色主题（默认）
       theme=1  浅色主题
       
       view=compact  紧凑视图
     
     获取 ID 方法：
       1. 打开 Spotify 网页版或客户端
       2. 分享 → 复制链接
       3. 链接中最后一个 / 后的字符串即为 ID
       如：https://open.spotify.com/track/6rqhFgbbKwnb9MLmUQDhG6
       ID 为：6rqhFgbbKwnb9MLmUQDhG6
     
     高度建议：
       单曲（小）：80px
       单曲（大）：152px
       专辑/播放列表/艺术家：352px
     ============================================ -->
